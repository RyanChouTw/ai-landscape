<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Landscape 2026</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; line-height: 1.6; }
a { color: #7cb3ff; text-decoration: none; }
a:hover { text-decoration: underline; }

.header { background: #111; border-bottom: 1px solid #222; padding: 16px 32px; position: sticky; top: 0; z-index: 100; }
.breadcrumb { font-size: 13px; color: #888; }
.breadcrumb a { color: #888; }
.breadcrumb a:hover { color: #7cb3ff; }
.breadcrumb .sep { margin: 0 8px; color: #444; }

.container { max-width: 900px; margin: 0 auto; padding: 32px; }

.detail-header { margin-bottom: 32px; }
.detail-name { font-size: 32px; font-weight: 700; color: #fff; margin-bottom: 4px; }
.detail-meta { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
.detail-company { font-size: 14px; color: #7cb3ff; background: #1a1a2a; padding: 4px 12px; border-radius: 6px; }
.detail-category { font-size: 13px; color: #888; background: #1a1a1a; padding: 4px 12px; border-radius: 6px; }
.detail-tags { display: flex; gap: 6px; }
.tag { font-size: 11px; padding: 3px 10px; border-radius: 4px; }
.tag-open { background: #1a2a1a; color: #6dcf6d; }
.tag-closed { background: #2a1a1a; color: #cf6d6d; }
.tag-free { background: #1a2a2a; color: #6dcfcf; }
.tag-paid { background: #2a2a1a; color: #cfcf6d; }
.detail-oneliner { font-size: 18px; color: #ccc; border-left: 3px solid #333; padding-left: 16px; margin: 16px 0; }

.section { margin-bottom: 32px; }
.section h2 { font-size: 18px; font-weight: 600; color: #fff; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #222; }
.section p { color: #bbb; margin-bottom: 12px; }

.pros-cons { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.pros, .cons { padding: 16px; border-radius: 8px; }
.pros { background: #0d1f0d; border: 1px solid #1a3a1a; }
.cons { background: #1f0d0d; border: 1px solid #3a1a1a; }
.pros h3 { color: #6dcf6d; font-size: 14px; margin-bottom: 8px; }
.cons h3 { color: #cf6d6d; font-size: 14px; margin-bottom: 8px; }
.pros ul, .cons ul { list-style: none; }
.pros li, .cons li { font-size: 13px; color: #aaa; padding: 4px 0; padding-left: 16px; position: relative; }
.pros li::before { content: "✓"; position: absolute; left: 0; color: #6dcf6d; }
.cons li::before { content: "✗"; position: absolute; left: 0; color: #cf6d6d; }

.timeline { position: relative; padding-left: 24px; }
.timeline::before { content: ""; position: absolute; left: 8px; top: 4px; bottom: 4px; width: 2px; background: #222; }
.timeline-item { position: relative; margin-bottom: 16px; }
.timeline-item::before { content: ""; position: absolute; left: -20px; top: 6px; width: 10px; height: 10px; border-radius: 50%; background: #333; border: 2px solid #555; }
.timeline-date { font-size: 12px; color: #7cb3ff; font-weight: 600; }
.timeline-event { font-size: 13px; color: #aaa; }

.features-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 12px; }
.feature-card { background: #151515; border: 1px solid #222; border-radius: 8px; padding: 14px; }
.feature-card h4 { font-size: 13px; color: #fff; margin-bottom: 4px; }
.feature-card p { font-size: 12px; color: #888; margin: 0; }

.pricing-box { background: #151515; border: 1px solid #222; border-radius: 8px; padding: 16px; }
.pricing-box p { color: #aaa; font-size: 14px; margin: 0; }

.competitors { display: flex; gap: 8px; flex-wrap: wrap; }
.competitor-chip { font-size: 13px; padding: 6px 14px; border-radius: 6px; background: #1a1a1a; border: 1px solid #333; color: #aaa; cursor: pointer; transition: all 0.15s; }
.competitor-chip:hover { border-color: #7cb3ff; color: #7cb3ff; }

.links-list { list-style: none; }
.links-list li { padding: 6px 0; border-bottom: 1px solid #1a1a1a; }
.links-list li a { font-size: 14px; }

.loading { text-align: center; padding: 80px 20px; color: #555; font-size: 16px; }
.not-found { text-align: center; padding: 80px 20px; }
.not-found h2 { color: #fff; margin-bottom: 8px; }
.not-found p { color: #888; }

.nav-footer { display: flex; justify-content: space-between; margin-top: 40px; padding-top: 20px; border-top: 1px solid #222; }
.nav-btn { font-size: 13px; color: #7cb3ff; padding: 8px 16px; border-radius: 6px; background: #1a1a2a; border: 1px solid #333; cursor: pointer; text-decoration: none; }
.nav-btn:hover { border-color: #7cb3ff; text-decoration: none; }

@media (max-width: 768px) {
  .container { padding: 16px; }
  .pros-cons { grid-template-columns: 1fr; }
  .detail-name { font-size: 24px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="breadcrumb" id="breadcrumb">
    <a href="index.html">AI Landscape 2026</a>
    <span class="sep">›</span>
    <span id="bc-category"></span>
    <span class="sep">›</span>
    <span id="bc-name"></span>
  </div>
</div>

<div class="container" id="content">
  <div class="loading">載入中...</div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const itemId = params.get('id');

if (!itemId) {
  document.getElementById('content').innerHTML = '<div class="not-found"><h2>找不到項目</h2><p><a href="index.html">返回 AI Landscape</a></p></div>';
} else {
  fetch(`data/items/${itemId}.json`)
    .then(r => { if (!r.ok) throw new Error('Not found'); return r.json(); })
    .then(data => renderDetail(data))
    .catch(() => {
      document.getElementById('content').innerHTML = `<div class="not-found"><h2>${decodeURIComponent(itemId)} 的詳細資料尚未建立</h2><p>此項目的深入研究正在進行中。</p><p style="margin-top:16px"><a href="index.html">← 返回 AI Landscape</a></p></div>`;
      document.getElementById('bc-name').textContent = decodeURIComponent(itemId);
    });
}

function renderDetail(d) {
  document.title = `${d.name} — AI Landscape 2026`;
  document.getElementById('bc-category').innerHTML = `<a href="index.html">${d.category}</a>`;
  document.getElementById('bc-name').textContent = d.name;

  const tagsHtml = (d.tags || []).map(t => {
    if (t === 'open') return '<span class="tag tag-open">開源</span>';
    if (t === 'closed') return '<span class="tag tag-closed">閉源</span>';
    if (t === 'free') return '<span class="tag tag-free">免費</span>';
    if (t === 'paid') return '<span class="tag tag-paid">付費</span>';
    return '';
  }).join('');

  let html = `
    <div class="detail-header">
      <div class="detail-name">${d.name}</div>
      <div class="detail-meta">
        <span class="detail-company">${d.company}</span>
        <span class="detail-category">${d.category}</span>
        <div class="detail-tags">${tagsHtml}</div>
      </div>
      <div class="detail-oneliner">${d.oneLiner}</div>
    </div>
  `;

  // Overview
  if (d.overview) {
    html += `<div class="section"><h2>概述</h2>${d.overview.split('\n').map(p => `<p>${p}</p>`).join('')}</div>`;
  }

  // Pros & Cons
  if (d.pros || d.cons) {
    html += `<div class="section"><h2>優點與缺點</h2><div class="pros-cons">`;
    if (d.pros) {
      html += `<div class="pros"><h3>優點</h3><ul>${d.pros.map(p => `<li>${p}</li>`).join('')}</ul></div>`;
    }
    if (d.cons) {
      html += `<div class="cons"><h3>缺點</h3><ul>${d.cons.map(c => `<li>${c}</li>`).join('')}</ul></div>`;
    }
    html += `</div></div>`;
  }

  // Features
  if (d.features && d.features.length) {
    html += `<div class="section"><h2>主要功能</h2><div class="features-grid">`;
    d.features.forEach(f => {
      html += `<div class="feature-card"><h4>${f.name}</h4><p>${f.desc}</p></div>`;
    });
    html += `</div></div>`;
  }

  // History
  if (d.history && d.history.length) {
    html += `<div class="section"><h2>發展歷史</h2><div class="timeline">`;
    d.history.forEach(h => {
      html += `<div class="timeline-item"><div class="timeline-date">${h.date}</div><div class="timeline-event">${h.event}</div></div>`;
    });
    html += `</div></div>`;
  }

  // Pricing
  if (d.pricing) {
    html += `<div class="section"><h2>定價</h2><div class="pricing-box"><p>${d.pricing}</p></div></div>`;
  }

  // Competitors
  if (d.competitors && d.competitors.length) {
    html += `<div class="section"><h2>主要競品</h2><div class="competitors">`;
    d.competitors.forEach(c => {
      const cId = c.toLowerCase().replace(/[\s\/\.]+/g, '-').replace(/[^a-z0-9-]/g, '');
      html += `<a href="detail.html?id=${cId}" class="competitor-chip">${c}</a>`;
    });
    html += `</div></div>`;
  }

  // Links
  if (d.links && d.links.length) {
    html += `<div class="section"><h2>參考連結</h2><ul class="links-list">`;
    d.links.forEach(l => {
      html += `<li><a href="${l.url}" target="_blank">${l.title}</a></li>`;
    });
    html += `</ul></div>`;
  }

  // Nav footer
  html += `<div class="nav-footer"><a href="index.html" class="nav-btn">← 返回 AI Landscape</a></div>`;

  document.getElementById('content').innerHTML = html;
}
</script>
</body>
</html>
